<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard de Vendas</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Papa Parse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-200 min-h-screen p-2">

    <div class="max-w-[1600px] mx-auto p-4">

        <!-- HEADER -->
        <div class="flex items-center justify-between mb-4">

            <div>
                <h1 class="text-2xl font-bold">
                    Dashboard Comercial
                </h1>
            </div>

            <!-- Upload -->
            <div class="bg-white border border-slate-200 rounded-xl px-4 py-3 shadow-sm">

                <input type="file" id="csvFile" accept=".csv" class="text-sm" />

            </div>

        </div>

        <!-- FILTROS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">

            <div class="bg-white border border-slate-200 rounded-xl p-3 shadow-sm">

                <label class="text-xs  block mb-1">
                    Vendedor
                </label>

                <select id="sellerFilter" class="w-full border border-slate-200 rounded-lg p-2 text-sm">
                    <option value="all">Todos</option>
                </select>

            </div>

            <div class="bg-white border border-slate-200 rounded-xl p-3 shadow-sm">

                <label class="text-xs text-slate-500 block mb-1">
                    Mês
                </label>

                <select id="monthFilter" class="w-full border border-slate-200 rounded-lg p-2 text-sm">
                    <option value="all">Todos</option>
                </select>

            </div>

            <div class="bg-white border border-slate-200 rounded-xl p-3 shadow-sm">

                <label class="text-xs text-slate-500 block mb-1">
                    Ano
                </label>

                <select id="yearFilter" class="w-full border border-slate-200 rounded-lg p-2 text-sm">
                    <option value="all">Todos</option>
                </select>

            </div>

        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-2 xl:grid-cols-6 gap-3 mb-4">

            <div class="bg-white border border-slate-500 rounded-xl p-4 shadow-sm">

                <p class="text-xs text-slate-500 uppercase tracking-wide">
                    Prospects
                </p>

                <h2 id="totalProspects" class="text-3xl font-bold mt-2">
                    0
                </h2>

            </div>

            <div class="bg-white border border-blue-800 rounded-xl p-4">

                <p class="text-xs text-slate-400 uppercase tracking-wider">
                    Em Andamento
                </p>

                <h2 id="inProgressDeals" class="text-3xl font-bold mt-2 text-violet-400">
                    0
                </h2>

            </div>

            <div class="bg-white border border-green-500 rounded-xl p-4 shadow-sm">

                <p class="text-xs text-slate-500 uppercase tracking-wide">
                    Vencemos
                </p>

                <h2 id="wonDeals" class="text-3xl font-bold mt-2 text-emerald-600">
                    0
                </h2>

            </div>

            <div class="bg-white border border-red-500 rounded-xl p-4 shadow-sm">

                <p class="text-xs text-slate-500 uppercase tracking-wide">
                    Perdemos
                </p>

                <h2 id="lostDeals" class="text-3xl font-bold mt-2 text-rose-600">
                    0
                </h2>

            </div>

            <div class="bg-white border border-gray-500 rounded-xl p-4">

                <p class="text-xs text-slate-400 uppercase tracking-wider">
                    Sem Viabilidade
                </p>

                <h2 id="noViabilityDeals" class="text-3xl font-bold mt-2 text-amber-400">
                    0
                </h2>

            </div>



            <div class="bg-white border border-sky-400 rounded-xl p-4 shadow-sm">

                <p class="text-xs text-slate-500 uppercase tracking-wide">
                    Conversão
                </p>

                <h2 id="conversionRate" class="text-3xl font-bold mt-2 text-sky-600">
                    0%
                </h2>

            </div>

        </div>

        <!-- GRÁFICOS -->
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
            <!-- VENDEDORES -->
            <div class="bg-white border  rounded-xl p-4">

                <h3 class="text-sm font-semibold mb-3 text-white">
                    Ranking de Vendedores
                </h3>

                <div class="h-[320px]">
                    <canvas id="sellersChart"></canvas>
                </div>

            </div>
            <!-- CANAIS -->
            <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">

                <h3 class="text-sm font-semibold mb-3">
                    Canais de Venda
                </h3>

                <div class="h-[320px]">
                    <canvas id="channelsChart"></canvas>
                </div>

            </div>

            <!-- CAMPANHAS -->
            <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">

                <h3 class="text-sm font-semibold mb-3">
                    Campanhas
                </h3>

                <div class="h-[320px]">
                    <canvas id="campaignsChart"></canvas>
                </div>

            </div>

            <!-- MOTIVOS -->
            <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">

                <h3 class="text-sm font-semibold mb-3">
                    Motivos de Perda
                </h3>

                <div class="h-[320px]">
                    <canvas id="lossReasonsChart"></canvas>
                </div>

            </div>

            <!-- VENDAS -->
            <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">

                <h3 class="text-sm font-semibold mb-3">
                    Vendas por Dia
                </h3>

                <div class="h-[320px]">
                    <canvas id="salesPerDayChart"></canvas>
                </div>

            </div>

            <!-- TAXAS -->
            <div class="bg-white border rounded-xl p-4">

                <h3 class="text-sm font-semibold mb-3 text-white">
                    Instalações Pagas vs Isentas
                </h3>

                <div class="h-[320px]">
                    <canvas id="installationChart"></canvas>
                </div>

            </div>

        </div>

    </div>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Papa Parse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CONFIG -->
    <script src="js/config.js"></script>

    <!-- MAPS -->
    <script src="js/maps/campaigns.js"></script>
    <script src="js/maps/channels.js"></script>
    <script src="js/maps/sellers.js"></script>

    <!-- CORE -->
    <script src="js/utils.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/kpis.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/filters.js"></script>

    <!-- APP -->
    <script src="js/app.js"></script>
</body>


</html>
